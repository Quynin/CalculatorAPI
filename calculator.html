<!DOCTYPE html>

<html>
    <head>
        <title>Calculator</title>    

        <link rel="stylesheet" href="calculatorAPI-styles.css">
    </head>    
    
    <body>

        <!-- Calculator string div -->
            <div style="width: 60vh">
                <input class="calc-display" id="calculatorTextBox" type="text" readonly>
            </div>
        <div class="container-container" style="width: 60vh">
            

            <!-- Calculator body -->
            <div class="grid-container">
                <input class="button grid-item" type="button" value="7">
                <input class="button grid-item" type="button" value="8">
                <input class="button grid-item" type="button" value="9">
                <input class="button grid-item" type="button" value="+">
                <input class="button grid-item" type="button" value="4">
                <input class="button grid-item" type="button" value="5">
                <input class="button grid-item" type="button" value="6">
                <input class="button grid-item" type="button" value="-">
                <input class="button grid-item" type="button" value="1">
                <input class="button grid-item" type="button" value="2">
                <input class="button grid-item" type="button" value="3">
                <input class="button grid-item" type="button" value="*">
                <input class="button grid-item" type="button" value="=">
                <input class="button grid-item" type="button" value="0">
                <input class="button grid-item" type="button" value=".">
                <input class="button grid-item" type="button" value="/">
            </div>
        </div>
    </body>    

    <!-- Import scripts -->
    <script src="scripts.js"></script>

    <footer>
        <a href="https://github.com/Quynin/CalculatorAPI">See the development of this project!</a>
    </footer>
</html>
